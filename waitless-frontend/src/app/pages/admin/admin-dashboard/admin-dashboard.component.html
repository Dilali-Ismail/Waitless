<div class="mx-auto max-w-6xl px-4 py-10 md:px-6">
  <div class="flex flex-col gap-2">
    <h1 class="font-heading text-2xl font-bold text-text-main dark:text-text-light">
      Dashboard Admin
    </h1>
    <p class="text-sm text-text-secondary">
      Vue d’ensemble rapide.
    </p>
  </div>

  <div class="mt-8 grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
    <a
      routerLink="/admin/users"
      class="group rounded-3xl border border-border bg-surface/90 p-6 shadow-[0_10px_30px_rgba(15,23,42,0.06)] transition hover:border-primary/40 dark:border-border-dark dark:bg-surface-dark/90"
    >
      <p class="text-sm font-semibold text-text-main dark:text-text-light">Users</p>
      <p class="mt-1 text-sm text-text-secondary">Gérer les utilisateurs</p>
      <p class="mt-4 text-sm font-semibold text-primary group-hover:underline">Ouvrir</p>
    </a>

    <a
      routerLink="/admin/companies"
      class="group rounded-3xl border border-border bg-surface/90 p-6 shadow-[0_10px_30px_rgba(15,23,42,0.06)] transition hover:border-primary/40 dark:border-border-dark dark:bg-surface-dark/90"
    >
      <p class="text-sm font-semibold text-text-main dark:text-text-light">Companies</p>
      <p class="mt-1 text-sm text-text-secondary">Gérer les entreprises</p>
      <p class="mt-4 text-sm font-semibold text-primary group-hover:underline">Ouvrir</p>
    </a>

    <div
      class="rounded-3xl border border-border bg-bg-light/60 p-6 text-text-main dark:border-border-dark dark:bg-bg-dark/30 dark:text-text-light"
    >
      <p class="text-sm font-semibold">Statistiques</p>
      <p class="mt-1 text-sm text-text-secondary">Comptes actuels</p>
      <div class="mt-4 grid grid-cols-2 gap-2">
        <div class="rounded-2xl border border-border bg-surface/80 px-3 py-2 dark:border-border-dark dark:bg-surface-dark/80">
          <p class="text-xs text-text-secondary">Users</p>
          <p class="text-sm font-bold">{{ (usersCount$ | async) ?? '—' }}</p>
        </div>
        <div class="rounded-2xl border border-border bg-surface/80 px-3 py-2 dark:border-border-dark dark:bg-surface-dark/80">
          <p class="text-xs text-text-secondary">Companies</p>
          <p class="text-sm font-bold">{{ (companiesCount$ | async) ?? '—' }}</p>
        </div>
      </div>
    </div>
  </div>
</div>
