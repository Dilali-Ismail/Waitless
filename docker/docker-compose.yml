services:
  # ==================== DATABASES ====================

  postgres:
    image: postgres:15-alpine
    container_name: waitless-postgres
    environment:
      POSTGRES_USER: waitless
      POSTGRES_PASSWORD: waitless123
      POSTGRES_MULTIPLE_DATABASES: queue_db,ticket_db,keycloak_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh:ro
    networks:
      - waitless-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waitless"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: waitless-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@waitless.com
      PGADMIN_DEFAULT_PASSWORD: waitless123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - waitless-network
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # ==================== INFRASTRUCTURE ====================

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: waitless-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: waitless
      KC_DB_PASSWORD: waitless123
    command: start-dev
    ports:
      - "8180:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - waitless-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: waitless-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    networks:
      - waitless-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: waitless-kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: waitless-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: 'true'
    ports:
      - "8090:8080"
    depends_on:
      - kafka
    networks:
      - waitless-network

  eureka-server:
    build:
      context: ../infrastructure/eureka-server/eureka-server
      dockerfile: Dockerfile
    container_name: waitless-eureka
    ports:
      - "8761:8761"
    networks:
      - waitless-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ==================== MICROSERVICES ====================

  queue-service:
    build:
      context: ../services/queue-service/queue-service
      dockerfile: Dockerfile
    container_name: waitless-queue-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/queue_db
      SPRING_DATASOURCE_USERNAME: waitless
      SPRING_DATASOURCE_PASSWORD: waitless123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/waitless-realm
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - waitless-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

