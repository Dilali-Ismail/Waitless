services:
  postgres:
    image: postgres:15-alpine
    container_name: waitless-postgres
    environment:
      POSTGRES_DB: waitless_db
      POSTGRES_USER: waitless
      POSTGRES_PASSWORD: waitless123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - waitless-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waitless"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: waitless-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev
    ports:
      - "8180:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - waitless-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: waitless-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    networks:
      - waitless-network

  eureka-server:
    build:
      context: ../infrastructure/eureka-server/eureka-server
      dockerfile: Dockerfile
    container_name: waitless-eureka
    ports:
      - "8761:8761"
    networks:
      - waitless-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  queue-service:
    build:
      context: ../services/queue-service/queue-service
      dockerfile: Dockerfile
    container_name: waitless-queue-service
    environment:
      # ⚠️ IMPORTANT : Override des URLs pour Docker network
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/waitless_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - waitless-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: waitless-kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: waitless-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: ""
      DYNAMIC_CONFIG_ENABLED: 'true'
    ports:
      - "8090:8080"
    depends_on:
      - kafka
    networks:
      - waitless-network

volumes:
  postgres_data:

networks:
  waitless-network:
    driver: bridge