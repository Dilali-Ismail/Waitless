name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - services/user-service
          - services/queue-service/queue-service
          - services/ticket-service/ticket-service
          - services/estimation-service/estimation-service
          - services/notification-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests for ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: mvn -B test