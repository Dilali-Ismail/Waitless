server:
  port: 8084

spring:
  application:
    name: estimation-service
estimation:
  default-service-time: 3

  queue-service-times:
    1: 3
    2: 5
    3: 2

logging:
  level:
    com.waitless.estimation: DEBUG

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}